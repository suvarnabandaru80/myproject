<title>Product — NOIR</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500&family=DM+Sans:wght@200;300;400;500&display=swap" rel="stylesheet"/>

<style>
.product-page{display:grid;grid-template-columns:1fr 1fr;gap:0;min-height:80vh;margin-top:80px}
.product-gallery{background:var(--surface);position:sticky;top:80px;height:calc(100vh - 80px);display:flex;flex-direction:column}
.main-img{flex:1;display:flex;align-items:center;justify-content:center;font-size:160px;background:linear-gradient(135deg,var(--surface) 0%,var(--surface2) 100%);position:relative;overflow:hidden;cursor:zoom-in}
.main-img .big-emoji{transition:transform 0.5s;display:block}
.main-img:hover .big-emoji{transform:scale(1.08)}
.thumb-row{display:flex;gap:8px;padding:16px;border-top:1px solid var(--border)}
.thumb{width:80px;height:80px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;transition:border-color 0.2s;flex-shrink:0}
.thumb.active{border-color:var(--gold)}
.thumb:hover{border-color:var(--faint)}

.product-info{padding:60px 60px 60px;overflow-y:auto}
.breadcrumb{font-size:11px;color:var(--muted);letter-spacing:1px;margin-bottom:24px;display:flex;gap:8px;align-items:center}
.breadcrumb a{color:var(--muted);transition:color 0.2s}
.breadcrumb a:hover{color:var(--gold)}
.breadcrumb span{color:var(--faint)}
.product-name{font-family:var(--serif);font-size:42px;font-weight:400;line-height:1.1;margin-bottom:16px}
.product-rating-row{display:flex;align-items:center;gap:16px;margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.stars-large{color:var(--gold);font-size:16px;letter-spacing:2px}
.rating-num{font-family:var(--serif);font-size:18px;color:var(--text)}
.review-count{font-size:13px;color:var(--muted)}
.price-row{display:flex;align-items:center;gap:16px;margin-bottom:32px}
.price-big{font-family:var(--serif);font-size:38px;font-weight:400;color:var(--gold)}
.price-original{font-size:20px;color:var(--muted);text-decoration:line-through}
.savings-badge{background:rgba(201,169,110,0.15);color:var(--gold);font-size:11px;font-weight:500;letter-spacing:1.5px;padding:4px 12px;border:1px solid rgba(201,169,110,0.3)}
.product-desc{font-size:14px;font-weight:200;line-height:2;color:var(--muted);margin-bottom:36px}

.selector-label{font-size:10px;font-weight:500;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;justify-content:space-between}
.color-options{display:flex;gap:10px;margin-bottom:28px}
.color-swatch{width:32px;height:32px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color 0.2s;position:relative}
.color-swatch.active,.color-swatch:hover{border-color:var(--gold)}
.color-swatch.active::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;color:white;text-shadow:0 1px 3px rgba(0,0,0,0.8)}
.size-options{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:32px}
.size-btn{min-width:48px;height:48px;background:transparent;border:1px solid var(--border);color:var(--muted);font-size:13px;font-family:var(--sans);cursor:pointer;transition:all 0.2s;padding:0 12px}
.size-btn:hover{border-color:var(--faint);color:var(--text)}
.size-btn.active{background:var(--gold);border-color:var(--gold);color:var(--bg);font-weight:500}
.size-btn.unavailable{opacity:0.3;cursor:not-allowed;text-decoration:line-through}

.qty-row{display:flex;align-items:center;gap:16px;margin-bottom:28px}
.qty-label{font-size:10px;font-weight:500;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted)}
.qty-control{display:flex;align-items:center;border:1px solid var(--border)}
.qty-btn{width:44px;height:44px;background:transparent;border:none;color:var(--text);font-size:20px;cursor:pointer;transition:background 0.2s;display:flex;align-items:center;justify-content:center}
.qty-btn:hover{background:var(--surface2)}
.qty-num{width:52px;text-align:center;font-family:var(--serif);font-size:18px;color:var(--text);background:transparent;border:none;border-left:1px solid var(--border);border-right:1px solid var(--border)}

.product-cta{display:flex;gap:12px;margin-bottom:40px}
.cta-cart{flex:1}
.cta-wish{width:56px;height:56px;background:transparent;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all 0.2s;color:var(--muted)}
.cta-wish:hover,.cta-wish.active{border-color:var(--danger);color:var(--danger)}

.product-meta{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:28px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:32px}
.meta-item-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.meta-item-value{font-size:13px;color:var(--text)}

.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:28px}
.tab-btn{background:transparent;border:none;color:var(--muted);font-family:var(--sans);font-size:12px;font-weight:500;letter-spacing:2px;text-transform:uppercase;padding:14px 24px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all 0.2s}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-content{display:none;font-size:14px;font-weight:200;line-height:1.9;color:var(--muted)}
.tab-content.active{display:block}
.tab-content ul{padding-left:20px;display:flex;flex-direction:column;gap:8px}

.related{padding:80px 60px;background:var(--surface);border-top:1px solid var(--border)}
.related-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-top:40px}

@media(max-width:900px){
  .product-page{grid-template-columns:1fr}
  .product-gallery{position:relative;height:50vh;top:0}
  .product-info{padding:32px 24px}
  .product-name{font-size:32px}
  .related{padding:60px 24px}
  .related-grid{grid-template-columns:1fr 1fr}
}
</style>
<style>
/* ── RESET & ROOT ───────────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0a;--surface:#141414;--surface2:#1e1e1e;--border:#2a2a2a;
  --text:#f5f0eb;--muted:#888;--faint:#444;
  --gold:#c9a96e;--gold-light:#e8d5b0;--white:#ffffff;
  --danger:#e05555;--success:#4caf7d;
  --serif:'Playfair Display',serif;--sans:'DM Sans',sans-serif;
  --radius:2px;--radius-lg:4px;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);overflow-x:hidden;min-height:100vh}
a{text-decoration:none;color:inherit}
button{cursor:pointer;font-family:var(--sans)}
img{max-width:100%;display:block}
input,select,textarea{font-family:var(--sans)}

/* ── SCROLLBAR ──────────────────────────────────────────────── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--faint)}

/* ── NAV ────────────────────────────────────────────────────── */
#main-nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:20px 60px;background:rgba(10,10,10,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);transition:padding 0.3s}
.nav-logo{font-family:var(--serif);font-size:22px;font-weight:700;letter-spacing:3px;color:var(--text)}
.nav-logo span{color:var(--gold)}
.nav-links{display:flex;gap:36px;list-style:none}
.nav-links a{font-size:12px;font-weight:400;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);transition:color 0.2s;position:relative}
.nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;width:0;height:1px;background:var(--gold);transition:width 0.3s}
.nav-links a:hover,.nav-links a.active{color:var(--text)}
.nav-links a:hover::after,.nav-links a.active::after{width:100%}
.nav-actions{display:flex;gap:20px;align-items:center}
.nav-icon-btn{color:var(--muted);transition:color 0.2s;position:relative;display:flex}
.nav-icon-btn:hover{color:var(--gold)}

/* ── BUTTONS ────────────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-family:var(--sans);font-size:11px;font-weight:500;letter-spacing:2.5px;text-transform:uppercase;border:none;padding:14px 32px;transition:all 0.3s;cursor:pointer}
.btn-gold{background:var(--gold);color:var(--bg)}
.btn-gold:hover{background:var(--gold-light)}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.btn-dark{background:var(--surface2);color:var(--text)}
.btn-dark:hover{background:var(--border)}
.btn-full{width:100%}
.btn-danger{background:transparent;color:var(--danger);border:1px solid var(--danger)}
.btn-danger:hover{background:var(--danger);color:white}

/* ── PRODUCT CARD ───────────────────────────────────────────── */
.product-card{background:var(--surface);border:1px solid var(--border);overflow:hidden;position:relative;transition:border-color 0.3s,transform 0.3s}
.product-card:hover{border-color:var(--faint);transform:translateY(-4px)}
.product-card-img{aspect-ratio:3/4;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:80px;position:relative;overflow:hidden}
.product-card-img .emoji-display{transition:transform 0.5s}
.product-card:hover .emoji-display{transform:scale(1.08)}
.product-badge{position:absolute;top:16px;left:16px;font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;padding:4px 10px;background:var(--gold);color:var(--bg)}
.product-badge.sale{background:var(--danger);color:white}
.product-badge.new{background:var(--success);color:white}
.product-card-body{padding:20px}
.product-card-name{font-family:var(--serif);font-size:17px;font-weight:400;color:var(--text);margin-bottom:6px;line-height:1.3}
.product-card-cat{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.product-card-footer{display:flex;align-items:center;justify-content:space-between}
.product-price{font-family:var(--serif);font-size:18px;font-weight:400;color:var(--gold)}
.product-price-original{font-size:13px;color:var(--muted);text-decoration:line-through;margin-left:8px;font-family:var(--sans)}
.product-rating{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px}
.product-rating .stars{color:var(--gold);font-size:10px;letter-spacing:1px}
.product-actions{display:flex;gap:0;margin-top:16px}
.product-wish-btn{width:44px;height:44px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0}
.product-wish-btn:hover,.product-wish-btn.active{color:var(--danger);border-color:var(--danger)}
.product-view-btn{flex:1;background:var(--surface2);border:1px solid var(--border);border-left:none;color:var(--muted);font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:12px;transition:all 0.2s}
.product-view-btn:hover{background:var(--gold);color:var(--bg);border-color:var(--gold)}

/* ── FORM ELEMENTS ──────────────────────────────────────────── */
.form-group{display:flex;flex-direction:column;gap:8px}
.form-label{font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--muted)}
.form-input{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--sans);font-size:14px;font-weight:300;padding:14px 18px;outline:none;transition:border-color 0.3s;width:100%}
.form-input:focus{border-color:var(--gold)}
.form-input::placeholder{color:var(--faint)}
select.form-input{cursor:pointer}
select.form-input option{background:var(--surface)}

/* ── PAGE WRAPPER ───────────────────────────────────────────── */
.page-wrap{padding-top:80px;min-height:100vh}

/* ── SECTION LABELS ─────────────────────────────────────────── */
.section-tag{font-size:10px;font-weight:500;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:16px}
.section-title{font-family:var(--serif);font-size:48px;font-weight:400;line-height:1.1;color:var(--text)}
.section-title em{font-style:italic;color:var(--gold)}

/* ── FOOTER ─────────────────────────────────────────────────── */
footer{background:var(--surface);border-top:1px solid var(--border);padding:80px 60px 0;margin-top:80px}
.footer-inner{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:60px;padding-bottom:60px}
.footer-logo{font-family:var(--serif);font-size:22px;font-weight:700;letter-spacing:3px;color:var(--text);margin-bottom:16px}
.footer-logo span{color:var(--gold)}
.footer-tagline{font-size:13px;color:var(--muted);line-height:1.8;max-width:220px;margin-bottom:28px}
.footer-social{display:flex;gap:12px}
.footer-social a{font-size:11px;font-weight:500;letter-spacing:1px;color:var(--muted);border:1px solid var(--border);padding:6px 12px;transition:all 0.2s}
.footer-social a:hover{color:var(--gold);border-color:var(--gold)}
.footer-col-title{font-size:10px;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:20px}
.footer-links{list-style:none;display:flex;flex-direction:column;gap:10px}
.footer-links a{font-size:13px;color:var(--muted);transition:color 0.2s}
.footer-links a:hover{color:var(--text)}
.footer-bottom{border-top:1px solid var(--border);padding:24px 0 32px;display:flex;justify-content:space-between;align-items:center}
.footer-bottom span{font-size:11px;color:var(--faint)}
.footer-legal{display:flex;gap:24px}
.footer-legal a{font-size:11px;color:var(--faint);transition:color 0.2s}
.footer-legal a:hover{color:var(--muted)}

/* ── RESPONSIVE ─────────────────────────────────────────────── */
@media(max-width:900px){
  #main-nav{padding:16px 24px}
  .nav-links{display:none}
  .footer-inner{grid-template-columns:1fr 1fr;gap:32px}
  footer{padding:60px 24px 0}
}

</style>
</head>
<body>
<div id="nav-placeholder"></div>
<div class="page-wrap" style="padding-top:0">
<div class="product-page" id="product-page">
  <div class="product-gallery">
    <div class="main-img" id="main-img"></div>
    <div class="thumb-row" id="thumb-row"></div>
  </div>
  <div class="product-info" id="product-info"></div>
</div>
<div class="related">
  <div class="section-tag">You May Also Like</div>
  <h2 class="section-title">Related <em>Products</em></h2>
  <div class="related-grid" id="related-grid"></div>
</div>
</div>
<div id="footer-placeholder"></div>

<script>
// ── SHARED STORE DATA ──────────────────────────────────────────
const STORE = {
  name: 'NOIR',
  tagline: 'Premium Fashion & Lifestyle',

  products: [
    { id:1, name:'Obsidian Leather Jacket', category:'outerwear', price:18500, original:22000, rating:4.8, reviews:124, badge:'Best Seller', emoji:'🧥', desc:'Premium full-grain leather jacket with quilted lining, YKK zippers, and a timeless silhouette built to last decades.', tags:['leather','jacket','premium'], colors:['#1a1a1a','#4a3728','#2c3e50'], sizes:['XS','S','M','L','XL'] },
    { id:2, name:'Silk Noir Blouse', category:'tops', price:6800, original:8500, rating:4.7, reviews:89, badge:'New', emoji:'👘', desc:'Pure mulberry silk blouse with hand-rolled hems, mother-of-pearl buttons, and a relaxed luxurious drape.', tags:['silk','blouse','luxury'], colors:['#f5f0eb','#1a1a1a','#8b6b5e'], sizes:['XS','S','M','L'] },
    { id:3, name:'Tailored Charcoal Trousers', category:'bottoms', price:9200, original:null, rating:4.9, reviews:203, badge:'Top Rated', emoji:'👔', desc:'Hand-finished wool-blend trousers with a sharp taper and double pleats, cut for a confident modern silhouette.', tags:['trousers','wool','tailored'], colors:['#4a4a4a','#1a1a1a','#2d4a3e'], sizes:['28','30','32','34','36'] },
    { id:4, name:'Merino Turtleneck', category:'tops', price:5400, original:6200, rating:4.6, reviews:156, badge:null, emoji:'🧶', desc:'Extra-fine 18.5-micron merino wool turtleneck. Feather-light, non-itch, and perfectly temperature-regulating.', tags:['merino','knitwear','winter'], colors:['#d4c5b5','#1a1a1a','#8b7355'], sizes:['XS','S','M','L','XL'] },
    { id:5, name:'Chelsea Ankle Boots', category:'footwear', price:14200, original:16000, rating:4.8, reviews:78, badge:'Sale', emoji:'👢', desc:'Hand-welted calfskin Chelsea boots with elastic gussets and a classic rubber sole. Handcrafted in Portugal.', tags:['boots','leather','chelsea'], colors:['#1a1a1a','#4a3728'], sizes:['38','39','40','41','42','43'] },
    { id:6, name:'Cashmere Wrap Coat', category:'outerwear', price:32000, original:38000, rating:4.9, reviews:67, badge:'Luxury', emoji:'🧣', desc:'Double-faced cashmere wrap coat with tortoiseshell horn buttons. The definitive investment piece for any wardrobe.', tags:['cashmere','coat','luxury'], colors:['#c8b89a','#1a1a1a','#6b4c3b'], sizes:['XS','S','M','L'] },
    { id:7, name:'Structured Tote Bag', category:'accessories', price:12500, original:null, rating:4.7, reviews:91, badge:'New', emoji:'👜', desc:'Full-grain pebbled leather tote with suede interior, magnetic closure, and polished gold hardware. Holds everything.', tags:['bag','leather','tote'], colors:['#1a1a1a','#4a3728','#c8b89a'], sizes:['One Size'] },
    { id:8, name:'Minimalist Watch', category:'accessories', price:24000, original:28000, rating:4.8, reviews:145, badge:'Sale', emoji:'⌚', desc:'Swiss quartz movement, 40mm stainless steel case, sapphire crystal glass, and a full-grain leather strap.', tags:['watch','accessories','premium'], colors:['#c0c0c0','#1a1a1a','#c8a96e'], sizes:['One Size'] },
  ],

  categories: ['All','outerwear','tops','bottoms','footwear','accessories'],
};

// ── CART MANAGEMENT ───────────────────────────────────────────
const Cart = {
  get() { try { return JSON.parse(localStorage.getItem('noir_cart') || '[]'); } catch(e){ return []; } },
  save(c) { localStorage.setItem('noir_cart', JSON.stringify(c)); Cart.updateBadge(); },
  add(productId, size, color, qty=1) {
    const cart = Cart.get();
    const key = `${productId}-${size}-${color}`;
    const existing = cart.find(i => i.key === key);
    if (existing) { existing.qty += qty; } 
    else { const p = STORE.products.find(p => p.id === productId); cart.push({key, productId, size, color, qty, price:p.price, name:p.name, emoji:p.emoji}); }
    Cart.save(cart);
    Cart.flash();
  },
  remove(key) { Cart.save(Cart.get().filter(i => i.key !== key)); },
  update(key, qty) {
    const cart = Cart.get();
    const item = cart.find(i => i.key === key);
    if (item) { item.qty = qty; if (item.qty <= 0) return Cart.remove(key); }
    Cart.save(cart);
  },
  total() { return Cart.get().reduce((s,i) => s + i.price * i.qty, 0); },
  count() { return Cart.get().reduce((s,i) => s + i.qty, 0); },
  clear() { Cart.save([]); },
  updateBadge() {
    document.querySelectorAll('.cart-count').forEach(el => {
      const c = Cart.count(); el.textContent = c; el.style.display = c > 0 ? 'flex' : 'none';
    });
  },
  flash() {
    document.querySelectorAll('.cart-icon').forEach(el => { el.classList.add('flash'); setTimeout(()=>el.classList.remove('flash'),600); });
    Cart.updateBadge();
    showToast('Added to cart ✓');
  }
};

// ── WISHLIST ─────────────────────────────────────────────────
const Wishlist = {
  get() { try { return JSON.parse(localStorage.getItem('noir_wishlist') || '[]'); } catch(e){ return []; } },
  toggle(id) {
    let w = Wishlist.get();
    if (w.includes(id)) { w = w.filter(x => x !== id); showToast('Removed from wishlist'); }
    else { w.push(id); showToast('Added to wishlist ♡'); }
    localStorage.setItem('noir_wishlist', JSON.stringify(w));
    document.querySelectorAll(`[data-wish="${id}"]`).forEach(el => el.classList.toggle('active', w.includes(id)));
  },
  has(id) { return Wishlist.get().includes(id); }
};

// ── TOAST ─────────────────────────────────────────────────────
function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id = 'toast'; document.body.appendChild(t); }
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ── FORMAT PRICE ──────────────────────────────────────────────
function fmt(n) { return '₹' + n.toLocaleString('en-IN'); }

// ── SHARED NAV ────────────────────────────────────────────────
function renderNav(activePage='') {
  const pages = [
    {label:'Shop', href:'shop.html'},
    {label:'Collections', href:'collections.html'},
    {label:'About', href:'about.html'},
  ];
  return `
  <nav id="main-nav">
    <a href="index.html" class="nav-logo">NOIR<span>.</span></a>
    <ul class="nav-links">
      ${pages.map(p=>`<li><a href="${p.href}" class="${activePage===p.label?'active':''}">${p.label}</a></li>`).join('')}
    </ul>
    <div class="nav-actions">
      <a href="wishlist.html" class="nav-icon-btn" title="Wishlist">

// ── SHARED CSS ─────────────────────────────────────────────────
function injectSharedCSS() {
  const style = document.createElement('style');
  style.textContent = `
    #toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(80px);background:#0a0a0a;color:#fff;font-size:13px;font-family:'DM Sans',sans-serif;padding:12px 28px;border-bottom:2px solid #c9a96e;opacity:0;transition:all 0.35s;z-index:9999;pointer-events:none;letter-spacing:0.5px;white-space:nowrap}
    #toast.show{transform:translateX(-50%) translateY(0);opacity:1}
    .cart-icon{position:relative}
    .cart-count{position:absolute;top:-6px;right:-8px;background:#c9a96e;color:#0a0a0a;font-size:10px;font-weight:700;width:18px;height:18px;border-radius:50%;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif}
    @keyframes cartFlash{0%,100%{transform:scale(1)}50%{transform:scale(1.3)}}
    .cart-icon.flash svg{animation:cartFlash 0.6s ease}
  `;
  document.head.appendChild(style);
}

// init on load
document.addEventListener('DOMContentLoaded', () => {
  injectSharedCSS();
  Cart.updateBadge();
});


document.getElementById('nav-placeholder').innerHTML = renderNav('Shop');
document.getElementById('footer-placeholder').innerHTML = renderFooter();

const params = new URLSearchParams(window.location.search);
const pid = parseInt(params.get('id')) || 1;
const p = STORE.products.find(x=>x.id===pid) || STORE.products[0];

let selectedColor = p.colors[0];
let selectedSize = '';
let qty = 1;
const savings = p.original ? p.original - p.price : 0;

document.title = p.name + ' — NOIR';

// Gallery
const mainImg = document.getElementById('main-img');
mainImg.innerHTML = `<span class="big-emoji">${p.emoji}</span>`;
const thumbRow = document.getElementById('thumb-row');
const thumbEmojis = [p.emoji,'🛍️','📦','✨'];
thumbEmojis.forEach((e,i)=>{
  const t=document.createElement('div');t.className='thumb'+(i===0?' active':'');
  t.innerHTML=`<span>${e}</span>`;
  t.onclick=()=>{document.querySelectorAll('.thumb').forEach(x=>x.classList.remove('active'));t.classList.add('active');mainImg.innerHTML=`<span class="big-emoji">${e}</span>`;};
  thumbRow.appendChild(t);
});

// Info
const info = document.getElementById('product-info');
const badgeClass = p.badge==='Sale'?'sale':p.badge==='New'?'new':'';
info.innerHTML = `
  <div class="breadcrumb"><a href="index.html">Home</a><span>›</span><a href="shop.html">Shop</a><span>›</span><a href="shop.html?cat=${p.category}">${p.category}</a><span>›</span>${p.name}</div>
  ${p.badge?`<div class="product-badge ${badgeClass}" style="display:inline-flex;margin-bottom:12px">${p.badge}</div>`:''}
  <h1 class="product-name">${p.name}</h1>
  <div class="product-rating-row">
    <span class="stars-large">${'★'.repeat(Math.floor(p.rating))}</span>
    <span class="rating-num">${p.rating}</span>
    <span class="review-count">(${p.reviews} reviews)</span>
  </div>
  <div class="price-row">
    <span class="price-big">${fmt(p.price)}</span>
    ${p.original?`<span class="price-original">${fmt(p.original)}</span><span class="savings-badge">SAVE ${fmt(savings)}</span>`:''}
  </div>
  <p class="product-desc">${p.desc}</p>

  <div class="selector-label">Colour <span id="color-name" style="color:var(--text)">${selectedColor}</span></div>
  <div class="color-options" id="color-options">
    ${p.colors.map((c,i)=>`<div class="color-swatch${i===0?' active':''}" style="background:${c}" onclick="selectColor('${c}',this)" title="${c}"></div>`).join('')}
  </div>

  <div class="selector-label">Size <a href="#" style="color:var(--gold);font-size:10px;letter-spacing:1px;text-decoration:underline">Size Guide</a></div>
  <div class="size-options" id="size-options">
    ${p.sizes.map(s=>`<button class="size-btn" onclick="selectSize('${s}',this)">${s}</button>`).join('')}
  </div>

  <div class="qty-row">
    <span class="qty-label">Qty</span>
    <div class="qty-control">
      <button class="qty-btn" onclick="changeQty(-1)">−</button>
      <input class="qty-num" id="qty-display" type="number" value="1" min="1" max="10" onchange="qty=parseInt(this.value)||1"/>
      <button class="qty-btn" onclick="changeQty(1)">+</button>
    </div>
  </div>

  <div class="product-cta">
    <button class="btn btn-gold btn-full cta-cart" onclick="addToCartAction()" style="height:56px;font-size:12px">Add to Cart</button>
    <button class="btn btn-gold btn-full" onclick="buyNow()" style="height:56px;font-size:12px;background:var(--surface2);color:var(--text);border:1px solid var(--border)">Buy Now</button>
    <button class="cta-wish ${Wishlist.has(p.id)?'active':''}" id="wish-btn" onclick="toggleWish()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="${Wishlist.has(p.id)?'currentColor':'none'}" stroke="currentColor" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
    </button>
  </div>

  <div class="product-meta">
    <div><div class="meta-item-label">SKU</div><div class="meta-item-value">NOIR-${String(p.id).padStart(4,'0')}</div></div>
    <div><div class="meta-item-label">Category</div><div class="meta-item-value">${p.category}</div></div>
    <div><div class="meta-item-label">Availability</div><div class="meta-item-value" style="color:var(--success)">✓ In Stock</div></div>
    <div><div class="meta-item-label">Shipping</div><div class="meta-item-value">3–5 Business Days</div></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('details',this)">Details</button>
    <button class="tab-btn" onclick="switchTab('shipping',this)">Shipping</button>
    <button class="tab-btn" onclick="switchTab('reviews',this)">Reviews (${p.reviews})</button>
  </div>
  <div class="tab-content active" id="tab-details">
    <p style="margin-bottom:16px">${p.desc}</p>
    <ul><li>Premium quality materials</li><li>Expert craftsmanship</li><li>Ethically sourced</li><li>Designed to last</li><li>Seasonal care instructions included</li></ul>
  </div>
  <div class="tab-content" id="tab-shipping">
    <ul><li><strong style="color:var(--text)">Standard Delivery</strong> — 3–5 business days (Free over ₹2,000)</li><li><strong style="color:var(--text)">Express Delivery</strong> — 1–2 business days (₹299)</li><li><strong style="color:var(--text)">Returns</strong> — 30 days, free return shipping</li><li>All orders shipped in signature NOIR packaging</li></ul>
  </div>
  <div class="tab-content" id="tab-reviews">
    ${[{name:'Anika R.',stars:5,text:'Absolutely stunning quality. Worth every rupee.'},{name:'Rohan M.',stars:5,text:'Perfect fit and the material feels incredibly luxurious.'},{name:'Priya S.',stars:4,text:'Beautiful piece. Delivery was fast and packaging was pristine.'}].map(r=>`
    <div style="border-bottom:1px solid var(--border);padding:20px 0">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <strong style="color:var(--text);font-size:14px">${r.name}</strong>
        <span style="color:var(--gold);font-size:12px">${'★'.repeat(r.stars)}</span>
      </div>
      <p>${r.text}</p>
    </div>`).join('')}
  </div>
`;

function selectColor(c,el){selectedColor=c;document.querySelectorAll('.color-swatch').forEach(x=>x.classList.remove('active'));el.classList.add('active');document.getElementById('color-name').textContent=c;}
function selectSize(s,el){selectedSize=s;document.querySelectorAll('.size-btn').forEach(x=>x.classList.remove('active'));el.classList.add('active');}
function changeQty(d){qty=Math.max(1,Math.min(10,qty+d));document.getElementById('qty-display').value=qty;}
function switchTab(id,btn){document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));btn.classList.add('active');document.getElementById('tab-'+id).classList.add('active');}
function addToCartAction(){if(!selectedSize){showToast('Please select a size');return;}Cart.add(p.id,selectedSize,selectedColor,qty);}
function buyNow(){if(!selectedSize){showToast('Please select a size');return;}Cart.add(p.id,selectedSize,selectedColor,qty);location.href='cart.html';}
function toggleWish(){Wishlist.toggle(p.id);const b=document.getElementById('wish-btn');b.classList.toggle('active',Wishlist.has(p.id));b.querySelector('svg').setAttribute('fill',Wishlist.has(p.id)?'currentColor':'none');}

// Related
const related = STORE.products.filter(x=>x.id!==p.id&&(x.category===p.category)).slice(0,4);
const fallback = STORE.products.filter(x=>x.id!==p.id).slice(0,4-related.length);
const relProducts = [...related,...fallback].slice(0,4);
const rg = document.getElementById('related-grid');
relProducts.forEach(rp=>{
  const card=document.createElement('div');card.className='product-card';
  card.innerHTML=`<div class="product-card-img"><span class="emoji-display" style="font-size:72px">${rp.emoji}</span></div>
  <div class="product-card-body">
    <div class="product-card-cat">${rp.category}</div>
    <div class="product-card-name">${rp.name}</div>
    <div class="product-card-footer"><span class="product-price">${fmt(rp.price)}</span><div class="product-rating"><span class="stars">★★★★★</span>${rp.rating}</div></div>
    <div class="product-actions">
      <button class="product-wish-btn" onclick="Wishlist.toggle(${rp.id})"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg></button>
      <button class="product-view-btn" onclick="location.href='product.html?id=${rp.id}'">View</button>
    </div>
  </div>`;
  rg.appendChild(card);
});
</script>
</body>
